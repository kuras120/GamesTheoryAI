import groovy.json.JsonSlurper

tasks.register('downloadGameTheoryRelease', Download)
def downloadGameTheoryRelease = tasks.downloadGameTheoryRelease {
    doFirst {
        def apiUrl = 'https://api.github.com/repos/kuras120/NeuralNetworks/releases/latest'
        def json = new JsonSlurper().parseText(new URL(apiUrl).text)
        def asset = json.assets.find { it.name.endsWith('.whl') }
        if (asset == null) throw new GradleException("No .whl asset found in latest release")
        src asset.browser_download_url
        println "Downloading latest release: ${asset.name}"
    }
    dest new File(buildDir.toString() + '/resources/main', 'games_theory-1.0.0-py3-none-any.whl')
}

tasks.register('createPythonVenv', Exec)
def createPythonVenv = tasks.createPythonVenv {
    workingDir buildDir.toString() + '/resources/main'
    commandLine 'python3', '-m', 'venv', 'venv'
}

jar {
    dependsOn downloadGameTheoryRelease
    dependsOn createPythonVenv
    // A virtual environment contains platform-specific binaries and symlinks.
    // Keep it available for local execution, but never package it in the JAR.
    exclude 'venv/**'
}

shadowJar {
    dependsOn jar
    exclude 'venv/**'
}
